services:
  postgres:
    image: postgres:16-alpine
    container_name: swapy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: swapy
      POSTGRES_USER: swapy
      POSTGRES_PASSWORD: swapy_password
    ports:
      - "5432:5432"
    volumes:
      - swapy_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swapy -d swapy"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  swapy_postgres_data:

